<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            padding: 20px;
        }

        h1 { color: #1DB954; }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-bar input, .search-bar select {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background-color: #282828;
            color: white;
            font-size: 14px;
        }

        .search-bar button {
            padding: 8px 16px;
            background-color: #1DB954;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-bar button:hover { background-color: #17a347; }

        #song-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .song-card {
            background-color: #282828;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .song-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background-color: #444;
        }

        .song-card h3 { margin: 5px 0; font-size: 15px; color: #fff; }
        .song-card p { margin: 3px 0; font-size: 13px; color: #aaa; }

        .no-image {
            width: 100%;
            height: 150px;
            background-color: #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .fav-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            margin-top: 8px;
            display: block;
            width: 100%;
        }

        .add-playlist-btn {
            margin-top: 6px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }

        .add-playlist-btn:hover { background: #1e3c72; }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e1e1e;
            border: 1px solid #2a5298;
            border-radius: 12px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .modal h3 { margin-top: 0; color: #7eb3ff; }

        .modal-close {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .playlist-option {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }

        .playlist-option:hover { border-color: #2a5298; }

        .playlist-option button {
            background: #1DB954;
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div style="background:#2a5298;padding:15px;display:flex;
            justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="margin:0;">🎵 Song Library</h2>
        <div>
            <button onclick="window.location.href='home.html'"
                    style="background:white;color:#2a5298;margin-right:8px;">Home</button>
            <button onclick="window.location.href='profile.html'"
                    style="background:white;color:#2a5298;margin-right:8px;">Profile</button>
            <button onclick="logout()"
                    style="background:#e74c3c;color:white;">Logout</button>
        </div>
    </div>

    <h1>🎵 Song Library</h1>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search...">
        <select id="search-type">
            <option value="all">All Songs</option>
            <option value="title">By Title</option>
            <option value="artist">By Artist</option>
            <option value="genre">By Genre</option>
            <option value="mood">By Mood</option>
        </select>
        <button onclick="searchSongs()">Search</button>
        <button onclick="loadAllSongs()">Reset</button>
    </div>

    <div id="song-list">Loading songs...</div>

    <!-- ADD TO PLAYLIST MODAL -->
    <div class="modal-overlay" id="addToPlaylistModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3>Add to Playlist</h3>
            <p id="modalSongName" style="color:#aaa;margin-bottom:12px;"></p>
            <div id="playlistOptions">Loading...</div>
        </div>
    </div>

    <script>
        const API_BASE = "https://music-player-m56j.onrender.com/api/songs";
        const BASE = "https://music-player-m56j.onrender.com";
        const currentUser = localStorage.getItem("currentUser");

        if (!currentUser) window.location.href = "index.html";

        let userFavIds = [];
        let userPlaylists = [];
        let selectedSongId = null;

        window.onload = loadAllSongs;

        // ===== LOAD ALL SONGS + USER DATA =====
        function loadAllSongs() {
            Promise.all([
                fetch(API_BASE).then(res => res.json()),
                fetch(`${BASE}/api/users/${currentUser}`).then(res => res.json())
            ])
            .then(([songs, user]) => {
                userFavIds = user.favoritedSongIds || [];
                loadUserPlaylists().then(() => displaySongs(songs));
            })
            .catch(err => {
                document.getElementById("song-list").innerHTML = "Failed to load songs.";
                console.error(err);
            });
        }

        function loadUserPlaylists() {
            return fetch(`${BASE}/api/users/${currentUser}`)
                .then(res => res.json())
                .then(user => {
                    const ids = user.playlistIds || [];
                    if (ids.length === 0) { userPlaylists = []; return; }
                    return Promise.all(ids.map(id =>
                        fetch(`${BASE}/api/playlists/${id}`).then(r => r.json())
                    )).then(playlists => { userPlaylists = playlists; });
                })
                .catch(() => { userPlaylists = []; });
        }

        // ===== SEARCH =====
        function searchSongs() {
            const type = document.getElementById("search-type").value;
            const query = document.getElementById("search-input").value.trim();

            if (type === "all" || query === "") { loadAllSongs(); return; }

            fetch(`${API_BASE}/${type}/${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(songs => displaySongs(songs))
                .catch(err => console.error(err));
        }

        // ===== DISPLAY SONGS =====
        function displaySongs(songs) {
            const container = document.getElementById("song-list");

            if (!songs || songs.length === 0) {
                container.innerHTML = "<p>No songs found.</p>";
                return;
            }

            container.innerHTML = songs.map(song => {
                const isFav = userFavIds.includes(song.id);
                return `
                    <div class="song-card">
                        ${song.imageBase64
                            ? `<img src="data:image/jpeg;base64,${song.imageBase64}" alt="${song.title}">`
                            : `<div class="no-image">No Image</div>`}
                        <h3>${song.title}</h3>
                        <p>${song.artist}</p>
                        <p>${song.genre} · ${song.mood}</p>
                        <p>${song.dateReleased || ""}</p>
                        <button
                            id="fav-${song.id}"
                            class="fav-btn ${isFav ? 'active' : ''}"
                            onclick="toggleFavorite('${song.id}')"
                            title="${isFav ? 'Unfavorite' : 'Favorite'}">
                            ${isFav ? '❤️' : '🤍'}
                        </button>
                        <button class="add-playlist-btn" onclick="openAddToPlaylist('${song.id}', '${song.title.replace(/'/g, "\\'")}')">
                            + Add to Playlist
                        </button>
                    </div>
                `;
            }).join("");
        }

        // ===== TOGGLE FAVORITE =====
        async function toggleFavorite(songId) {
            const btn = document.getElementById(`fav-${songId}`);
            const isCurrentlyFav = btn.classList.contains("active");
            const newFavState = !isCurrentlyFav;

            btn.classList.toggle("active", newFavState);
            btn.textContent = newFavState ? "❤️" : "🤍";

            try {
                const response = await fetch(
                    `${BASE}/api/users/${currentUser}/favorites/${songId}?isFavorite=${newFavState}`,
                    { method: "PATCH" }
                );
                if (!response.ok) throw new Error("Failed");
                if (newFavState) { userFavIds.push(songId); }
                else { userFavIds = userFavIds.filter(id => id !== songId); }
            } catch {
                btn.classList.toggle("active", isCurrentlyFav);
                btn.textContent = isCurrentlyFav ? "❤️" : "🤍";
                alert("Could not update favorite.");
            }
        }

        // ===== ADD TO PLAYLIST MODAL =====
        function openAddToPlaylist(songId, songTitle) {
            selectedSongId = songId;
            document.getElementById("modalSongName").textContent = songTitle;
            document.getElementById("addToPlaylistModal").classList.add("active");

            const optionsDiv = document.getElementById("playlistOptions");
            if (userPlaylists.length === 0) {
                optionsDiv.innerHTML = "<p style='color:#888;'>No playlists yet. Create one in Your Library first!</p>";
                return;
            }

            optionsDiv.innerHTML = userPlaylists.map(p => `
                <div class="playlist-option">
                    <span>${p.name}</span>
                    <button onclick="addSongToPlaylist('${p.id}')">Add</button>
                </div>
            `).join("");
        }

        function closeModal() {
            document.getElementById("addToPlaylistModal").classList.remove("active");
            selectedSongId = null;
        }

        document.getElementById("addToPlaylistModal").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });

        function addSongToPlaylist(playlistId) {
            if (!selectedSongId) return;
            fetch(`${BASE}/api/playlists/${playlistId}/songs/${selectedSongId}`, { method: "PUT" })
                .then(res => {
                    if (!res.ok) throw new Error();
                    closeModal();
                    alert("Song added to playlist!");
                })
                .catch(() => alert("Failed to add song to playlist."));
        }

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
