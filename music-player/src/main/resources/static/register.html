<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #2a5298;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

a {
    color: #2a5298;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <h1>Create Account 🎵</h1>

    <form onsubmit="return registerUser()">
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
</form>

    <p id="message" style="color:red;"></p>

    <p>Already have an account? <a href="index.html">Log in</a></p>
</div>

<script>
function registerUser() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const email = document.getElementById("email").value;
    const btn = document.querySelector("button[type='submit']");
    const msg = document.getElementById("message");

    // Show loading state
    btn.disabled = true;
    btn.textContent = "Creating account...";
    msg.style.color = "#2a5298";
    msg.textContent = "Please wait...";

    fetch("https://music-player-m56j.onrender.com/api/users/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
    })
    .then(res => res.text())
    .then(data => {
        if (data === "Registration successful.") {
            msg.style.color = "green";
            msg.textContent = "Account created! Logging you in...";

            // Auto login
            return fetch("https://music-player-m56j.onrender.com/api/users/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.text())
            .then(loginData => {
                if (loginData.toLowerCase().includes("successful")) {
                    localStorage.setItem("currentUser", username);
                    window.location.href = "home.html";
                } else {
                    msg.style.color = "green";
                    msg.textContent = "Account created! Please log in.";
                    setTimeout(() => window.location.href = "index.html", 1500);
                }
            });
        } else {
            msg.style.color = "red";
            msg.textContent = data;
            btn.disabled = false;
            btn.textContent = "Sign Up";
        }
    })
    .catch(() => {
        msg.style.color = "red";
        msg.textContent = "Connection error. Please try again.";
        btn.disabled = false;
        btn.textContent = "Sign Up";
    });

    return false;
}
</script>

</body>
</html>
