<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>




<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #2a5298;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

a {
    color: #2a5298;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <h1>Welcome Back 🎵</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Log In</button>

    <p id="message" style="color:red;"></p>

    <p>Don't have an account? <a href="register.html">Sign up</a></p>
</div>

<script>
document.getElementById("loginBtn").addEventListener("click", function() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("message");

    if (!username || !password) {
        msg.style.color = "red";
        msg.innerText = "Please enter username and password.";
        return;
    }

    // Show loading state
    btn.disabled = true;
    btn.textContent = "Logging in...";
    msg.style.color = "#2a5298";
    msg.innerText = "Please wait...";

    fetch("https://music-player-m56j.onrender.com/api/users/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(async res => {
        if (res.ok) return res.text();
        const err = await res.text();
        throw new Error(err || "Login failed");
    })
    .then(data => {
        if (data.toLowerCase().includes("successful")) {
            msg.style.color = "green";
            msg.innerText = "Login successful! Redirecting...";
            localStorage.setItem("currentUser", username);
            setTimeout(() => window.location.href = "home.html", 500);
        } else {
            msg.style.color = "red";
            msg.innerText = data;
            btn.disabled = false;
            btn.textContent = "Log In";
        }
    })
    .catch(err => {
        console.error("Login Error:", err);
        msg.style.color = "red";
        msg.innerText = err.message || "Connection error. Is the backend running?";
        btn.disabled = false;
        btn.textContent = "Log In";
    });
});
</script>

</body>
</html>
