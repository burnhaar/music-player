<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #121212;
            color: white;
        }

        .navbar {
            background: #2a5298;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            opacity: 0.8;
        }

        .song {
            background: #1e1e1e;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            position: relative;
        }

        .fav-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
            padding: 0;
            z-index: 10;
        }

        .fav-btn:hover {
            transform: scale(1.2);
            opacity: 1;
        }

        .add-playlist-btn {
            margin-top: 8px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .add-playlist-btn:hover {
            background: #1e3c72;
        }

        /* ===== SECTION HEADERS ===== */
        .section-header {
            padding: 20px 20px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h3 {
            margin: 0;
        }

        /* ===== PLAYLISTS ===== */
        .playlist-card {
            background: #1a1a2e;
            border: 1px solid #2a5298;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .playlist-name {
            font-weight: bold;
            font-size: 16px;
            color: #7eb3ff;
        }

        .playlist-actions button {
            margin-left: 6px;
            font-size: 12px;
            padding: 4px 10px;
        }

        .playlist-song {
            background: #252525;
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .playlist-song button {
            background: #e74c3c;
            color: white;
            font-size: 11px;
            padding: 3px 8px;
        }

        .create-playlist-bar {
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .create-playlist-bar input {
            padding: 7px 12px;
            border-radius: 6px;
            border: 1px solid #2a5298;
            background: #1e1e1e;
            color: white;
            font-size: 14px;
            width: 220px;
        }

        .create-playlist-bar button {
            background: #1DB954;
            color: black;
            font-weight: bold;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1e1e1e;
            border: 1px solid #2a5298;
            border-radius: 12px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .modal h3 {
            margin-top: 0;
            color: #7eb3ff;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .playlist-option {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }

        .playlist-option:hover {
            border-color: #2a5298;
        }

        .playlist-option button {
            background: #1DB954;
            color: black;
            font-size: 12px;
            padding: 4px 10px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h2>🎵 My Library</h2>
        <div>
            <button onclick="window.location.href='songs.html'">Browse Songs</button>
            <button onclick="goToProfile()">Profile</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div style="padding:20px 20px 0 20px;">
        <input type="text" id="search" placeholder="Search your library..." onkeyup="searchLibrary()"
            style="padding:8px; width:60%; background:#1e1e1e; border:1px solid #333; color:white; border-radius:6px;">
    </div>

    <!-- SAVED SONGS -->
    <div class="section-header">
        <h3>❤️ Your Library</h3>
    </div>
    <div id="library" style="padding:0 20px 20px 20px;">Loading...</div>

    <!-- PLAYLISTS -->
    <div class="section-header">
        <h3>📋 Your Playlists</h3>
    </div>

    <div class="create-playlist-bar">
        <input type="text" id="newPlaylistName" placeholder="New playlist name...">
        <button onclick="createPlaylist()">+ Create</button>
    </div>

    <div id="playlists" style="padding:0 20px 40px 20px;">Loading playlists...</div>

    <!-- ADD TO PLAYLIST MODAL -->
    <div class="modal-overlay" id="addToPlaylistModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3>Add to Playlist</h3>
            <p id="modalSongName" style="color:#aaa; margin-bottom:12px;"></p>
            <div id="playlistOptions">Loading...</div>
        </div>
    </div>

    <script>
        const BASE = "https://music-player-m56j.onrender.com";
        let currentUser = localStorage.getItem("currentUser");

        if (!currentUser) {
            window.location.href = "index.html";
        }

        let allSongs = [];
        let userPlaylists = [];
        let selectedSongId = null;

        window.onload = function () {
            loadLibrary();
            loadPlaylists();
        };

        // ===== LOAD SAVED SONGS =====
        function loadLibrary() {
            Promise.all([
                fetch(`${BASE}/api/users/${currentUser}`).then(res => res.json()),
                fetch(`${BASE}/api/songs`).then(res => res.json())
            ])
            .then(([user, songs]) => {
                allSongs = songs;
                const favIds = user.favoritedSongIds || [];
                const savedSongs = songs.filter(s => favIds.includes(s.id));
                renderLibrary(savedSongs);
            })
            .catch(err => {
                document.getElementById("library").innerHTML = "<p>Failed to load songs.</p>";
                console.error(err);
            });
        }

        function renderLibrary(songs) {
            const libraryDiv = document.getElementById("library");

            if (!songs || songs.length === 0) {
                libraryDiv.innerHTML = "<p style='color:#888;'>No saved songs yet. Browse songs and hit ❤️ to save them!</p>";
                return;
            }

            libraryDiv.innerHTML = songs.map(song => `
                <div class="song">
                    <button class="fav-btn active" onclick="toggleFavorite('${song.id}', this)">❤️</button>
                    ${song.imageBase64
                        ? `<img src="data:image/jpeg;base64,${song.imageBase64}" 
                            style="width:100%;height:120px;object-fit:cover;border-radius:6px;">`
                        : `<div style="height:120px;background:#333;border-radius:6px;
                            display:flex;align-items:center;justify-content:center;
                            color:#888;">No Image</div>`}
                    <strong>${song.title}</strong><br>
                    <span style="color:#aaa;">${song.artist} · ${song.genre} · ${song.mood}</span><br>
                    <button class="add-playlist-btn" onclick="openAddToPlaylist('${song.id}', '${song.title.replace(/'/g, "\\'")}')">
                        + Add to Playlist
                    </button>
                </div>
            `).join("");
        }

        // ===== SEARCH LIBRARY =====
        function searchLibrary() {
            const query = document.getElementById("search").value.toLowerCase();

            fetch(`${BASE}/api/users/${currentUser}`)
                .then(res => res.json())
                .then(user => {
                    const favIds = user.favoritedSongIds || [];
                    const savedSongs = allSongs.filter(s => favIds.includes(s.id));

                    if (!query) {
                        renderLibrary(savedSongs);
                        return;
                    }

                    const filtered = savedSongs.filter(s =>
                        s.title.toLowerCase().includes(query) ||
                        s.artist.toLowerCase().includes(query)
                    );
                    renderLibrary(filtered);
                });
        }

        // ===== TOGGLE FAVORITE =====
        async function toggleFavorite(songId, btn) {
            const isCurrentlyFav = btn.classList.contains("active");
            const newFavState = !isCurrentlyFav;

            try {
                const response = await fetch(
                    `${BASE}/api/users/${currentUser}/favorites/${songId}?isFavorite=${newFavState}`,
                    { method: "PATCH" }
                );
                if (!response.ok) throw new Error("Failed");
                loadLibrary(); // reload to reflect removal
            } catch (err) {
                alert("Could not update favorite. Please try again.");
            }
        }

        // ===== LOAD PLAYLISTS =====
        function loadPlaylists() {
            fetch(`${BASE}/api/users/${currentUser}`)
                .then(res => res.json())
                .then(user => {
                    const playlistIds = user.playlistIds || [];
                    if (playlistIds.length === 0) {
                        document.getElementById("playlists").innerHTML = "<p style='color:#888;'>No playlists yet. Create one above!</p>";
                        userPlaylists = [];
                        return;
                    }

                    return Promise.all(
                        playlistIds.map(id =>
                            fetch(`${BASE}/api/playlists/${id}`).then(res => res.json())
                        )
                    );
                })
                .then(playlists => {
                    if (!playlists) return;
                    userPlaylists = playlists;
                    renderPlaylists(playlists);
                })
                .catch(err => {
                    document.getElementById("playlists").innerHTML = "<p>Failed to load playlists.</p>";
                    console.error(err);
                });
        }

        function renderPlaylists(playlists) {
            const container = document.getElementById("playlists");

            if (!playlists || playlists.length === 0) {
                container.innerHTML = "<p style='color:#888;'>No playlists yet. Create one above!</p>";
                return;
            }

            container.innerHTML = playlists.map(playlist => {
                const songs = (playlist.songIds || [])
                    .map(id => allSongs.find(s => s.id === id))
                    .filter(Boolean);

                return `
                    <div class="playlist-card">
                        <div class="playlist-header">
                            <span class="playlist-name">🎵 ${playlist.name}</span>
                            <div class="playlist-actions">
                                <button onclick="deletePlaylist('${playlist.id}')" 
                                    style="background:#e74c3c;color:white;">🗑 Delete</button>
                            </div>
                        </div>
                        ${songs.length === 0
                            ? `<p style="color:#888;font-size:13px;">No songs yet.</p>`
                            : songs.map(song => `
                                <div class="playlist-song">
                                    <span>${song.title} <span style="color:#888;">· ${song.artist}</span></span>
                                    <button onclick="removeSongFromPlaylist('${playlist.id}', '${song.id}')">Remove</button>
                                </div>
                            `).join("")
                        }
                    </div>
                `;
            }).join("");
        }

        // ===== CREATE PLAYLIST =====
        function createPlaylist() {
            const name = document.getElementById("newPlaylistName").value.trim();
            if (!name) { alert("Please enter a playlist name."); return; }

            fetch(`${BASE}/api/playlists/?username=${currentUser}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name, isPrivate: false, songIds: [] })
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById("newPlaylistName").value = "";
                loadPlaylists();
            })
            .catch(err => {
                alert("Failed to create playlist.");
                console.error(err);
            });
        }

        // ===== DELETE PLAYLIST =====
        function deletePlaylist(playlistId) {
            if (!confirm("Delete this playlist?")) return;

            fetch(`${BASE}/api/playlists/${playlistId}?username=${currentUser}`, {
                method: "DELETE"
            })
            .then(() => loadPlaylists())
            .catch(err => {
                alert("Failed to delete playlist.");
                console.error(err);
            });
        }

        // ===== REMOVE SONG FROM PLAYLIST =====
        function removeSongFromPlaylist(playlistId, songId) {
            fetch(`${BASE}/api/playlists/${playlistId}/songs/${songId}`, {
                method: "DELETE"
            })
            .then(() => loadPlaylists())
            .catch(err => {
                alert("Failed to remove song.");
                console.error(err);
            });
        }

        // ===== ADD TO PLAYLIST MODAL =====
        function openAddToPlaylist(songId, songTitle) {
            selectedSongId = songId;
            document.getElementById("modalSongName").textContent = songTitle;
            document.getElementById("addToPlaylistModal").classList.add("active");

            const optionsDiv = document.getElementById("playlistOptions");

            if (userPlaylists.length === 0) {
                optionsDiv.innerHTML = "<p style='color:#888;'>No playlists yet. Create one first!</p>";
                return;
            }

            optionsDiv.innerHTML = userPlaylists.map(p => `
                <div class="playlist-option">
                    <span>${p.name}</span>
                    <button onclick="addSongToPlaylist('${p.id}')">Add</button>
                </div>
            `).join("");
        }

        function closeModal() {
            document.getElementById("addToPlaylistModal").classList.remove("active");
            selectedSongId = null;
        }

        document.getElementById("addToPlaylistModal").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });

        function addSongToPlaylist(playlistId) {
            if (!selectedSongId) return;

            fetch(`${BASE}/api/playlists/${playlistId}/songs/${selectedSongId}`, {
                method: "PUT"
            })
            .then(res => {
                if (!res.ok) throw new Error("Failed");
                closeModal();
                loadPlaylists();
                alert("Song added to playlist!");
            })
            .catch(err => {
                alert("Failed to add song to playlist.");
                console.error(err);
            });
        }

        // ===== NAV =====
        function goToProfile() {
            window.location.href = "profile.html";
        }

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
